services:
  omni:
    restart: always
    container_name: omni
    image: ghcr.io/siderolabs/omni:v1.6.5@sha256:25c549c78218735bf45a3127b13055a34d98b95358708c0c68ab2e90f350ed2e
    volumes:
      - /home/serveradmin/omni/etcd:/_out/etcd
      - /etc/letsencrypt/live/omni.${DOMAIN}/fullchain.pem:/tls.crt
      - /etc/letsencrypt/live/omni.${DOMAIN}/privkey.pem:/tls.key
      - /home/serveradmin/omni/omni.asc:/omni.asc
      - /home/serveradmin/omni/config:/config
    command:
      - --account-id=${ACCOUNT_ID}
      - --name=onprem-omni
      - --cert=/tls.crt
      - --key=/tls.key
      - --siderolink-api-cert=/tls.crt
      - --siderolink-api-key=/tls.key
      - --private-key-source=file:///omni.asc
      - --event-sink-port=8091
      - --bind-addr=0.0.0.0:443
      - --siderolink-api-bind-addr=0.0.0.0:8090
      - --k8s-proxy-bind-addr=0.0.0.0:8100
      - --advertised-api-url=https://omni.${DOMAIN}
      - --siderolink-api-advertised-url=https://omni.${DOMAIN}:8090/
      - --siderolink-wireguard-advertised-addr=${ADVERTISED_IP}:50180
      - --advertised-kubernetes-proxy-url=https://omni.${DOMAIN}:8100/
      - --auth-auth0-enabled=true
      - --auth-auth0-domain=${AUTH0_DOMAIN}
      - --auth-auth0-client-id=${AUTH0_CLIENT_ID}
      - --initial-users=${INITIAL_EMAIL}
      - --enable-break-glass-configs
      - --sqlite-storage-path=/config/db/sqlite.db
    network_mode: host
    cap_add:
      - NET_ADMIN
    privileged: true
  omni-infra-provider-proxmox:
    image: ghcr.io/siderolabs/omni-infra-provider-proxmox@sha256:28a28a6c9e6b81ac2b86e3a0977b8f3d2da2df84497d8b58a147db987179cc68
    volumes:
      - /home/serveradmin/omni/proxmox-infra-provider/config.yaml:/config.yaml
    command: >
      --config-file /config.yaml
      --omni-api-endpoint https://omni.${DOMAIN}
      --omni-service-account-key ${PROXMOX_INFRA_PROVIDER_KEY}
    restart: unless-stopped
volumes:
  omni:
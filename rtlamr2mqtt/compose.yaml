services:
  rtlamr:
    container_name: rtlamr2mqtt
    image: allangood/rtlamr2mqtt:2025.6.3@sha256:5f477f560cca4f0d44e283d37e43d75ce147aeefc0944d52689a5c67cd39efab
    restart: unless-stopped
    devices:
      - /dev/bus/usb
    volumes:
      - /root/wireless-stack/rtlamr2mqtt/rtlamr2mqtt.yaml:/etc/rtlamr2mqtt.yaml:ro
      - /root/wireless-stack/rtlamr2mqtt/data:/var/lib/rtlamr2mqtt